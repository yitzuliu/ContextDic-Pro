name: ContextDic Pro CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Backend Testing (Continuous Integration)
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      - name: Run tests with Pytest
        env:
          GEMINI_API_KEY: "test_key" # Using dummy key for CI
          API_SECRET: "test_secret"
        run: |
          PYTHONPATH=. pytest backend/tests/test_api.py

  # Job 2: Security Secret Scan (Prevent Leaks)
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for secret scanning
          
      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # Job 3: Build Chrome Extension (Continuous Deployment Candidate)
  build-extension:
    needs: [backend-ci, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Extension Package (ZIP)
        run: |
          zip -r contextdic-pro-v2.0.0.zip src/ assets/ manifest.json README.md
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: contextdic-pro-extension-v2.0.0
          path: contextdic-pro-v2.0.0.zip
